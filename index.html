<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PACE — Fitness Tracker</title>
<link rel="stylesheet" href="style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>
 
<div class="wrap">
 
  <!-- header -->
  <header class="topbar">
    <div class="brand">
      <svg width="30" height="26" viewBox="0 0 34 14">
        <line x1="2" y1="12" x2="10" y2="2" stroke="var(--accent-steps)" stroke-width="3"/>
        <line x1="12" y1="12" x2="20" y2="2" stroke="var(--accent-cal)" stroke-width="3"/>
        <line x1="22" y1="12" x2="30" y2="2" stroke="var(--accent-active)" stroke-width="3"/>
      </svg>
      <div class="display logo">PACE</div>
    </div>
    <div class="topbar-right">
      <div class="pill label-caps" id="streak-pill">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cal)" stroke-width="2"><path d="M12 2c1 4-3 5-3 9a3 3 0 0 0 6 0c0-1.5-1-2-1-3.5C15.5 10 17 12 17 14a5 5 0 0 1-10 0c0-5 4-6 5-12Z"/></svg>
        <span id="streak-count">0</span>-day streak
      </div>
      <div class="label-caps muted" id="today-label"></div>
    </div>
  </header>
 
  <!-- today rings -->
  <section class="card">
    <div class="card-head">
      <div class="display h2">TODAY'S LAP</div>
      <button class="link-btn label-caps" id="goals-toggle">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 20 9-9-3-3-9 9v3h3Z"/></svg>
        Goals
      </button>
    </div>
 
    <div class="goals-editor" id="goals-editor" hidden>
      <div class="field">
        <label class="label-caps muted">Steps</label>
        <input type="number" id="goal-steps" min="1" />
      </div>
      <div class="field">
        <label class="label-caps muted">Calories</label>
        <input type="number" id="goal-calories" min="1" />
      </div>
      <div class="field">
        <label class="label-caps muted">Active min</label>
        <input type="number" id="goal-active" min="1" />
      </div>
      <button class="btn-dark label-caps" id="goals-save">Save</button>
      <button class="btn-ghost label-caps" id="goals-cancel">Cancel</button>
    </div>
 
    <div class="rings" id="rings-container"></div>
  </section>
 
  <div class="lane-divider" aria-hidden="true">
    <span class="line"></span>
    <svg width="34" height="14" viewBox="0 0 34 14">
      <line x1="2" y1="12" x2="10" y2="2" stroke="var(--accent-steps)" stroke-width="2"/>
      <line x1="12" y1="12" x2="20" y2="2" stroke="var(--accent-cal)" stroke-width="2"/>
      <line x1="22" y1="12" x2="30" y2="2" stroke="var(--accent-active)" stroke-width="2"/>
    </svg>
    <span class="line"></span>
  </div>
 
  <!-- log form -->
  <section class="card">
    <div class="display h2" style="margin-bottom:16px;">LOG AN ACTIVITY</div>
    <form id="entry-form" class="entry-form">
      <div class="field">
        <label class="label-caps muted">Type</label>
        <select id="f-type">
          <option>Walking</option>
          <option selected>Running</option>
          <option>Cycling</option>
          <option>Strength</option>
          <option>Swimming</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label class="label-caps muted">Date</label>
        <input type="date" id="f-date" />
      </div>
      <div class="field">
        <label class="label-caps muted">Duration (min)</label>
        <input type="number" id="f-duration" min="0" placeholder="0" />
      </div>
      <div class="field">
        <label class="label-caps muted">Steps</label>
        <input type="number" id="f-steps" min="0" placeholder="0" />
      </div>
      <div class="field">
        <label class="label-caps muted">Calories</label>
        <input type="number" id="f-calories" min="0" placeholder="0" />
      </div>
      <button type="submit" class="btn-dark label-caps">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Add entry
      </button>
    </form>
  </section>
 
  <div class="lane-divider" aria-hidden="true">
    <span class="line"></span>
    <svg width="34" height="14" viewBox="0 0 34 14">
      <line x1="2" y1="12" x2="10" y2="2" stroke="var(--accent-steps)" stroke-width="2"/>
      <line x1="12" y1="12" x2="20" y2="2" stroke="var(--accent-cal)" stroke-width="2"/>
      <line x1="22" y1="12" x2="30" y2="2" stroke="var(--accent-active)" stroke-width="2"/>
    </svg>
    <span class="line"></span>
  </div>
 
  <!-- weekly chart -->
  <section class="card">
    <div class="card-head wrap-row">
      <div class="display h2">WEEKLY PROGRESS</div>
      <div class="totals label-caps muted">
        <span>Steps total <b class="mono-num" id="week-steps-total">0</b></span>
        <span>Calories total <b class="mono-num" id="week-cal-total">0</b></span>
      </div>
    </div>
    <svg id="chart" width="100%" height="260" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
  </section>
 
  <div class="lane-divider" aria-hidden="true">
    <span class="line"></span>
    <svg width="34" height="14" viewBox="0 0 34 14">
      <line x1="2" y1="12" x2="10" y2="2" stroke="var(--accent-steps)" stroke-width="2"/>
      <line x1="12" y1="12" x2="20" y2="2" stroke="var(--accent-cal)" stroke-width="2"/>
      <line x1="22" y1="12" x2="30" y2="2" stroke="var(--accent-active)" stroke-width="2"/>
    </svg>
    <span class="line"></span>
  </div>
 
  <!-- activity log -->
  <section class="card">
    <div class="display h2" style="margin-bottom:16px;">ACTIVITY LOG</div>
    <div id="log-empty" class="label-caps muted" hidden>No entries yet — log your first activity above.</div>
    <div id="log-container" class="log-container"></div>
  </section>
 
  <footer class="footer label-caps muted">
    Data is saved to this browser's local storage — nothing is sent to a server.
  </footer>
 
</div>
 
<script src="script.js"></script>
</body>
</html>
